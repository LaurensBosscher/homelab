apiVersion: v1
kind: ConfigMap
metadata:
  name: nullclaw-config
  labels:
    app.kubernetes.io/name: nullclaw
data:
  config.json: |
    {
      "default_temperature": 0.7,
      "models": {
        "providers": {
          "openrouter": {},
          "z.ai": {}
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "openrouter/healer-alpha"
          }
        }
      },
      "model_routes": [
        {
          "hint": "fast",
          "provider": "z.ai",
          "model": "glm-4.7",
          "cost_class": "cheap",
          "quota_class": "normal"
        },
        {
          "hint": "balanced",
          "provider": "openrouter",
          "model": "healer-alpha",
          "cost_class": "standard",
          "quota_class": "normal"
        }
      ],
      "memory": {
        "backend": "sqlite",
        "auto_save": true
      },
      "gateway": {
        "host": "::",
        "port": 3000,
        "require_pairing": true,
        "allow_public_bind": true
      },
      "autonomy": {
        "level": "supervised",
        "workspace_only": true,
        "max_actions_per_hour": 20
      },
      "security": {
        "sandbox": {
          "backend": "auto"
        },
        "audit": {
          "enabled": true
        }
      }
    }
