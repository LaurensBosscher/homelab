apiVersion: apps/v1
kind: Deployment
metadata:
  name: wealthfolio
  labels:
    app.kubernetes.io/name: wealthfolio
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wealthfolio
  template:
    metadata:
      labels:
        app: wealthfolio
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: region
                    operator: In
                    values:
                      - us
      containers:
        - name: wealthfolio
          image: wealthfolio/wealthfolio:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          env:
            - name: WF_LISTEN_ADDR
              value: "0.0.0.0:8088"
            - name: WF_DB_PATH
              value: "/data/wealthfolio.db"
            - name: WF_STATIC_DIR
              value: "dist"
            - name: WF_CORS_ALLOW_ORIGINS
              value: "https://wealthfolio.bosscher.ch"
            - name: WF_REQUEST_TIMEOUT_MS
              value: "30000"
            - name: WF_AUTH_TOKEN_TTL_MINUTES
              value: "60"
            - name: WF_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: wealthfolio-secrets
                  key: WF_SECRET_KEY
            - name: WF_AUTH_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: wealthfolio-secrets
                  key: WF_AUTH_PASSWORD_HASH
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wealthfolio-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
