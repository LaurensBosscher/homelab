---
- name: Configure host firewall (nftables)
  when: firewall_enable | bool
  tags: [firewall]
  block:
    - name: Stop and disable firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Mask firewalld to prevent accidental start
      ansible.builtin.systemd:
        name: firewalld
        masked: true
      ignore_errors: true

    - name: Build dynamic allowlists from inventory
      ansible.builtin.set_fact:
        firewall_cluster_network_ips: >-
          {{ ((groups['kubernetes_control_plane'] | default([])) + (groups['kubernetes_agent'] | default([])))
             | map('extract', hostvars, 'cluster_network_ip')
             | select('defined')
             | unique
             | list }}
        firewall_k3s_api_allowed_ips: >-
          {{ ((groups['kubernetes_control_plane'] | default([])) + (groups['kubernetes_agent'] | default([])))
             | map('extract', hostvars, 'cluster_network_ip')
             | select('defined')
             | list
             + (firewall_k3s_api_extra_allowed_ips | default([]))
             | unique
             | list }}
        firewall_control_plane_network_ips: >-
          {{ (groups['kubernetes_control_plane'] | default([]))
             | map('extract', hostvars, 'cluster_network_ip')
             | select('defined')
             | unique
             | list }}
      tags: [firewall]

    - name: Deploy nftables configuration from template
      ansible.builtin.template:
        src: nftables.conf.j2
        dest: "{{ '/etc/sysconfig/nftables.conf' if ansible_facts.os_family == 'RedHat' else '/etc/nftables.conf' }}"
        owner: root
        group: root
        mode: "0644"
        validate: nft -c -f %s
      notify: reload nftables
      tags: [firewall, config]

    - name: Ensure nftables service is enabled and started
      ansible.builtin.systemd:
        name: nftables
        enabled: true
        state: started
      tags: [firewall, persistence]
